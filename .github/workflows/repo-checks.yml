name: Repo Checks

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  repo-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Verify documentation assets
        run: |
          test -f README.md
          test -f README.ja.md
          test -f docs/index.md
          test -f docs/ja/index.md
          test -f media/matanyone-hero.svg

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs

      - name: Build docs
        run: npm run docs:build
        working-directory: docs

      - name: Compile Python sources
        run: python -m compileall hugging_face matanyone2 scripts

      - name: Lint maintained Python surfaces
        run: |
          uvx ruff check pyproject.toml hugging_face/app.py hugging_face/__init__.py scripts/run_pipeline_check.py
          uvx ruff check matanyone2/__init__.py matanyone2/__main__.py matanyone2/api.py matanyone2/cli.py matanyone2/demo_core.py matanyone2/gradio.py matanyone2/runtime.py

  package-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build package artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify editable install and entrypoints
        run: |
          python -m venv .pkg-venv
          ./.pkg-venv/bin/python -m pip install --upgrade pip
          ./.pkg-venv/bin/python -m pip install --no-deps -e .
          ./.pkg-venv/bin/python -c "import importlib.metadata as m; print(m.version('matanyone2-runtime'))"
          ./.pkg-venv/bin/python -c "from matanyone2 import run_pipeline; print(callable(run_pipeline))"
          ./.pkg-venv/bin/matanyone2-runtime --help
          ./.pkg-venv/bin/python -m matanyone2 --help
          test -x ./.pkg-venv/bin/matanyone2-runtime
          test -x ./.pkg-venv/bin/matanyone-cli
          test -x ./.pkg-venv/bin/matanyone-gradio

      - name: Verify wheel install exports Python API
        run: |
          python -m venv .wheel-venv
          ./.wheel-venv/bin/python -m pip install --upgrade pip
          ./.wheel-venv/bin/python -m pip install --no-deps dist/*.whl
          ./.wheel-venv/bin/python -c "import importlib.metadata as m; print(m.version('matanyone2-runtime'))"
          ./.wheel-venv/bin/python -c "from matanyone2 import run_pipeline; print(callable(run_pipeline))"
          ./.wheel-venv/bin/matanyone2-runtime --help

  readme-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check README links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose README.md README.ja.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
